<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>يوتيوب خفيف</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  margin: 0;
  padding: 10px;
  font-size: 14px;
}

h1 { color: #ff0000; text-align: center; font-size: 20px; margin: 10px 0; }
p.sub { text-align: center; color: #aaa; font-size: 12px; margin: 0 0 12px 0; }

#search-box {
  width: 100%;
  box-sizing: border-box;
  padding: 8px;
  font-size: 14px;
  margin: 8px 0;
  background: #222;
  color: #fff;
  border: 1px solid #555;
}

button {
  background: #ff0000;
  color: #fff;
  border: none;
  padding: 8px 18px;
  font-size: 14px;
  cursor: pointer;
  margin: 4px 2px;
}

button.grey { background: #333; }

#frame-box {
  margin-top: 12px;
  display: none;
}

#main-frame {
  width: 100%;
  height: 520px;
  border: none;
  background: #111;
}

.site-links div {
  background: #1a1a1a;
  border: 1px solid #333;
  padding: 8px;
  margin: 6px 0;
}

.site-links button {
  background: #ff0000;
  border: none;
  padding: 6px 10px;
  margin-top: 5px;
  cursor: pointer;
}

#status {
  color: #aaa;
  font-size: 12px;
  margin: 6px 0;
}
</style>

</head>

<body>

<h1>▶ يوتيوب خفيف</h1>
<p class="sub">بحث خفيف — بدون تطبيق يوتيوب</p>

<input type="text" id="search-box" placeholder="ابحث عن فيديو..." />
<button onclick="doSearch()">🔍 بحث</button>
<button class="grey" onclick="clearAll()">مسح</button>

<div id="status"></div>

<div id="frame-box">
  <iframe id="main-frame" allowfullscreen></iframe>
</div>

<div class="site-links" id="alt-links"></div>

<script>
var WORKER_URL = "https://solitary-grass-a3a8.alsydhsdrh.workers.dev";

function doSearch() {
  var q = document.getElementById("search-box").value.trim();
  if (!q) {
    document.getElementById("status").innerHTML = "اكتب شي تبحث عنه!";
    return;
  }

  document.getElementById("status").innerHTML = "⏳ جاري البحث...";
  document.getElementById("alt-links").innerHTML = "";
  document.getElementById("frame-box").style.display = "none";

  fetch(WORKER_URL + "?q=" + encodeURIComponent(q))
    .then(res => res.json())
    .then(res => {
      if (!res.data || res.data.length === 0) {
        document.getElementById("status").innerHTML = "ما فيه نتائج";
        return;
      }

      document.getElementById("status").innerHTML =
        "✓ نتائج من " + res.instance.replace("https://","");

      let html = "";

      for (let i = 0; i < res.data.length; i++) {
        let v = res.data[i];

        let videoUrl = res.instance + "/embed/" + v.videoId;

        html += `
          <div>
            <div>${v.title}</div>
            <div style="color:#aaa;font-size:11px">
              ${v.author} • ${v.viewCount} views
            </div>
            <button onclick="playVideo('${videoUrl}')">تشغيل</button>
          </div>
        `;
      }

      document.getElementById("alt-links").innerHTML = html;
    })
    .catch(() => {
      document.getElementById("status").innerHTML = "خطأ في الاتصال";
    });
}

function playVideo(url) {
  document.getElementById("frame-box").style.display = "block";
  document.getElementById("main-frame").src = url;
}

function clearAll() {
  document.getElementById("search-box").value = "";
  document.getElementById("alt-links").innerHTML = "";
  document.getElementById("frame-box").style.display = "none";
  document.getElementById("main-frame").src = "";
  document.getElementById("status").innerHTML = "";
}

document.getElementById("search-box").onkeydown = function(e) {
  if (e.keyCode === 13) doSearch();
};
</script>

</body>
</html>
