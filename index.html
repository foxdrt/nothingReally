<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>يوتيوب خفيف</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  margin: 0;
  padding: 10px;
  font-size: 14px;
}
h1 { color: #ff0000; text-align: center; font-size: 20px; margin: 10px 0; }
p.sub { text-align: center; color: #aaa; font-size: 12px; margin: 0 0 12px 0; }
#search-box {
  width: 100%;
  box-sizing: border-box;
  padding: 8px;
  font-size: 14px;
  margin: 8px 0;
  background: #222;
  color: #fff;
  border: 1px solid #555;
  display: block;
}
button {
  background: #ff0000;
  color: #fff;
  border: none;
  padding: 8px 18px;
  font-size: 14px;
  cursor: pointer;
  margin: 4px 2px;
}
button.grey { background: #333; }
button:hover { opacity: 0.85; }
#frame-box {
  margin-top: 12px;
  display: none;
}
#main-frame {
  width: 100%;
  height: 520px;
  border: none;
  background: #111;
  display: block;
}
.links-title {
  color: #aaa;
  font-size: 11px;
  margin: 10px 0 4px 0;
}
.site-links a {
  display: inline-block;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #ff9900;
  font-size: 11px;
  padding: 4px 8px;
  margin: 3px 3px 3px 0;
  text-decoration: none;
}
.site-links a:hover { background: #252525; }
#status {
  color: #aaa;
  font-size: 12px;
  margin: 6px 0;
}
</style>
</head>
<body>

<h1>▶ يوتيوب خفيف</h1>
<p class="sub">بحث مباشر — بدون تطبيق بدون إعلانات</p>

<input type="text" id="search-box" placeholder="ابحث عن فيديو..." />
<button onclick="doSearch()">🔍 بحث</button>
<button class="grey" onclick="clearAll()">مسح</button>

<div id="status"></div>

<div id="frame-box">
  <iframe id="main-frame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>

  <div class="links-title">لو الصفحة ما فتحت — جرب سيرفر ثاني:</div>
  <div class="site-links" id="alt-links"></div>
</div>

<script>
var INSTANCES = [
  "https://yewtu.be",
  "https://invidious.nerdvpn.de",
  "https://invidious.privacydev.net",
  "https://iv.datura.network",
  "https://yt.cdaut.de",
  "https://invidious.fdn.fr",
  "https://tube.mha.fi",
  "https://invidious.lunar.icu"
];

var currentInstance = 0;

function doSearch() {
  var q = document.getElementById("search-box").value.trim();
  if (!q) { document.getElementById("status").innerHTML = "اكتب شي تبحث عنه!"; return; }

  document.getElementById("status").innerHTML = "⏳ جاري الفتح...";
  document.getElementById("frame-box").style.display = "block";

  var instance = INSTANCES[currentInstance];
  var url = instance + "/search?q=" + encodeURIComponent(q);

  document.getElementById("main-frame").src = url;

  // Build alt links
  var links = "";
  for (var i = 0; i < INSTANCES.length; i++) {
    var altUrl = INSTANCES[i] + "/search?q=" + encodeURIComponent(q);
    var label = INSTANCES[i].replace("https://","");
    links += '<a href="' + altUrl + '" onclick="loadInFrame(\'' + altUrl + '\');return false;">' + label + '</a>';
  }
  document.getElementById("alt-links").innerHTML = links;

  document.getElementById("status").innerHTML =
    '✓ يعرض عبر: <span style="color:#ff9900">' + instance.replace("https://","") + '</span>';
}

function loadInFrame(url) {
  document.getElementById("main-frame").src = url;
  document.getElementById("status").innerHTML =
    '✓ يعرض عبر: <span style="color:#ff9900">' + url.split("/search")[0].replace("https://","") + '</span>';
}

function clearAll() {
  document.getElementById("search-box").value = "";
  document.getElementById("frame-box").style.display = "none";
  document.getElementById("main-frame").src = "";
  document.getElementById("status").innerHTML = "";
}

document.getElementById("search-box").onkeydown = function(e) {
  if ((e.keyCode || e.which) === 13) doSearch();
};
</script>

</body>
</html>
